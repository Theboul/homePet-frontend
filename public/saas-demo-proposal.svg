<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A00D4"/>
      <stop offset="55%" stop-color="#A000E6"/>
      <stop offset="100%" stop-color="#7A00CC"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="stripeAnim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 40px 'Geist Variable', 'Manrope', sans-serif; fill: #ffffff; }
      .subtitle { font: 500 19px 'Geist Variable', 'Manrope', sans-serif; fill: rgba(255,255,255,.9); }
      .cardTitle { font: 700 23px 'Geist Variable', 'Manrope', sans-serif; fill: #111827; }
      .cardText { font: 500 15px 'Geist Variable', 'Manrope', sans-serif; fill: #4B5563; }
      .flow { font: 700 14px 'Geist Variable', 'Manrope', sans-serif; fill: #6B7280; }
      .mono { font: 600 13px 'Geist Variable', 'Manrope', monospace; fill: #374151; }
      .ok { font: 700 13px 'Geist Variable', 'Manrope', sans-serif; fill: #065F46; }
      .warn { font: 700 13px 'Geist Variable', 'Manrope', sans-serif; fill: #92400E; }
      .route { font: 700 13px 'Geist Variable', 'Manrope', sans-serif; fill: #5B21B6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>

  <text x="80" y="90" class="title">HomePet SaaS Demo · Flujo con Login Existente</text>
  <text x="80" y="124" class="subtitle">No se reemplaza login actual: se agregan dos entradas desde landing</text>

  <g filter="url(#shadow)">
    <rect x="80" y="170" width="1440" height="190" rx="24" fill="url(#hero)"/>
  </g>
  <text x="120" y="232" class="title" style="font-size:34px">/landing</text>
  <text x="120" y="270" class="subtitle">Botones de entrada al SaaS: trial inmediato o compra directa</text>
  <rect x="120" y="292" width="190" height="46" rx="12" fill="#F97316"/>
  <text x="157" y="321" style="font:700 16px 'Geist Variable','Manrope',sans-serif; fill:#fff;">Prueba gratis</text>
  <rect x="328" y="292" width="190" height="46" rx="12" fill="#fff"/>
  <text x="364" y="321" style="font:700 16px 'Geist Variable','Manrope',sans-serif; fill:#5B21B6;">Comprar ahora</text>

  <g filter="url(#shadow)">
    <rect x="80" y="420" width="450" height="290" rx="20" fill="#ffffff"/>
  </g>
  <text x="110" y="468" class="cardTitle">Flujo A · Prueba gratis</text>
  <text x="110" y="495" class="route">/trial-signup</text>
  <text x="110" y="525" class="cardText">Formulario veterinaria + admin</text>
  <text x="110" y="552" class="mono">POST /api/auth/public/trial-signup/</text>
  <rect x="110" y="570" width="190" height="30" rx="8" fill="#ECFDF5"/>
  <text x="129" y="590" class="ok">Guardar access/refresh</text>
  <rect x="310" y="570" width="190" height="30" rx="8" fill="#EEF2FF"/>
  <text x="346" y="590" class="route">Ir a /dashboard</text>
  <text x="110" y="632" class="cardText">Este camino NO pasa por login (sesion queda iniciada)</text>
  <rect x="110" y="654" width="146" height="28" rx="14" fill="#FEF3C7"/>
  <text x="128" y="672" class="warn">slug ocupado</text>
  <rect x="268" y="654" width="180" height="28" rx="14" fill="#FEF3C7"/>
  <text x="286" y="672" class="warn">correo registrado</text>

  <g filter="url(#shadow)">
    <rect x="575" y="420" width="450" height="290" rx="20" fill="#ffffff"/>
  </g>
  <text x="605" y="468" class="cardTitle">Flujo B · Comprar ahora</text>
  <text x="605" y="495" class="route">/pricing -> /checkout-demo</text>
  <text x="605" y="525" class="mono">POST /api/auth/public/checkout-demo/start/</text>
  <text x="605" y="548" class="mono">POST /api/auth/public/checkout-demo/confirm/</text>
  <rect x="605" y="570" width="390" height="14" rx="7" fill="#E5E7EB"/>
  <rect x="605" y="570" width="240" height="14" rx="7" fill="url(#stripeAnim)">
    <animate attributeName="x" values="605;680;605" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <text x="605" y="610" class="cardText">Pantalla animada tipo Stripe (demo)</text>
  <rect x="605" y="632" width="172" height="30" rx="8" fill="#F3F4F6"/>
  <text x="632" y="652" class="flow">Confirmado -> /login</text>
  <text x="605" y="690" class="cardText">Este camino SI usa login existente despues del checkout</text>

  <g filter="url(#shadow)">
    <rect x="1070" y="420" width="450" height="290" rx="20" fill="#ffffff"/>
  </g>
  <text x="1100" y="468" class="cardTitle">Login actual + panel</text>
  <text x="1100" y="495" class="route">/login (se mantiene)</text>
  <text x="1100" y="525" class="cardText">Entrada de usuarios existentes y compradores directos</text>
  <text x="1100" y="552" class="cardText">Luego acceso a dashboard segun permisos/suscripcion</text>

  <rect x="1100" y="578" width="190" height="30" rx="8" fill="#F3F4F6"/>
  <text x="1133" y="598" class="flow">/dashboard</text>
  <path d="M1300 593 L1338 593" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="5 5"/>
  <rect x="1348" y="578" width="150" height="30" rx="15" fill="#FEF3C7"/>
  <text x="1392" y="598" class="warn">TRIAL</text>

  <rect x="1100" y="626" width="280" height="30" rx="8" fill="#EEF2FF"/>
  <text x="1127" y="646" class="route">Bloqueo suscripcion -> /billing</text>
  <rect x="1390" y="626" width="108" height="30" rx="15" fill="#DCFCE7"/>
  <text x="1420" y="646" class="ok">ACTIVA</text>

  <path d="M320 338 C300 372, 240 390, 210 420" stroke="#9CA3AF" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M430 338 C520 366, 620 390, 690 420" stroke="#9CA3AF" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1025 565 C1060 565, 1068 565, 1096 565" stroke="#9CA3AF" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="760" width="1440" height="260" rx="20" fill="#ffffff"/>
  </g>
  <text x="110" y="810" class="cardTitle">Resumen de reglas</text>
  <text x="110" y="845" class="cardText">1) No se rompe nada existente: /login sigue siendo la puerta principal para usuarios ya registrados.</text>
  <text x="110" y="877" class="cardText">2) Desde landing se agregan dos CTA: "Prueba gratis" (autologin) y "Comprar ahora" (checkout + login).</text>
  <text x="110" y="909" class="cardText">3) Con bloqueo de suscripcion, frontend redirige a /billing y permite login/recuperacion/facturacion.</text>
  <text x="110" y="941" class="cardText">4) En trial se muestra banner "vence en X dias" y desde /billing se hace upgrade demo.</text>
  <text x="110" y="973" class="cardText">5) Logout limpia sesion local; interceptor gestiona refresh token de forma transparente.</text>
</svg>
